<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ben Studios — Baltic Birch Furniture</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <style>
    :root {
      --red: #D4001A; --blk: #0A0A0A; --wht: #FFFFFF;
      --off: #F5F1EB; --mid: #888; --lt: #E4E0D8; --hd: 56px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; }
    body { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; background: var(--wht); color: var(--blk); }

    /* ── Header ─────────────────────────────────────────────── */
    .site-hd { position: fixed; top: 0; left: 0; right: 0; height: var(--hd); background: var(--wht); border-bottom: 1px solid var(--lt); z-index: 20; display: flex; align-items: center; }
    .hd-inner { width: 100%; display: flex; align-items: center; justify-content: space-between; padding: 0 28px; }
    .logo { font-size: 13px; font-weight: 800; letter-spacing: 0.13em; text-transform: uppercase; color: var(--blk); text-decoration: none; cursor: pointer; }
    .logo span { color: var(--red); }
    .hd-nav { display: flex; gap: 22px; }
    .hd-nav a { font-size: 10px; font-weight: 600; letter-spacing: 0.09em; text-transform: uppercase; color: var(--mid); text-decoration: none; cursor: pointer; transition: color 0.1s; }
    .hd-nav a:hover, .hd-nav a.active { color: var(--blk); }

    /* ── Layout ─────────────────────────────────────────────── */
    .product-pg { position: fixed; top: var(--hd); left: 0; right: 0; bottom: 0; display: grid; grid-template-columns: 58fr 42fr; }

    /* ── Viewer ─────────────────────────────────────────────── */
    .viewer-wrap { position: relative; background: var(--off); overflow: hidden; }
    #canvas { position: absolute; inset: 0; width: 100%; height: 100%; cursor: grab; }
    #canvas:active { cursor: grabbing; }
    .viewer-hint { position: absolute; bottom: 18px; right: 18px; font-size: 9px; color: #AAA; letter-spacing: 0.06em; pointer-events: none; }
    .viewer-dim { position: absolute; top: 18px; left: 18px; font-size: 11px; font-weight: 600; letter-spacing: 0.05em; color: var(--blk); background: rgba(255,255,255,0.82); backdrop-filter: blur(8px); padding: 6px 11px; border: 1px solid rgba(0,0,0,0.07); pointer-events: none; }

    /* ── Panel ──────────────────────────────────────────────── */
    .pd-panel { overflow-y: auto; border-left: 1px solid var(--lt); background: var(--wht); }
    .pd-inner { padding: 28px 38px 60px; }


    /* ── Product info ───────────────────────────────────────── */
    .breadcrumb { font-size: 10px; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; color: var(--mid); margin-bottom: 10px; }
    .breadcrumb span { color: #CCC; margin: 0 6px; }
    .pd-name { font-size: 24px; font-weight: 700; letter-spacing: -0.02em; line-height: 1.15; margin-bottom: 10px; }

    /* ── Edition badge ──────────────────────────────────────── */
    .edition-row { display: flex; align-items: center; gap: 10px; margin-bottom: 18px; }
    .edition-badge { font-size: 9px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--blk); background: var(--off); padding: 4px 10px; border: 1px solid var(--lt); }
    .edition-no { font-size: 11px; color: var(--mid); letter-spacing: 0.04em; }

    .pd-price { font-size: 36px; font-weight: 800; letter-spacing: -0.03em; font-variant-numeric: tabular-nums; line-height: 1; margin-bottom: 5px; }
    .pd-sub { font-size: 11px; color: var(--mid); letter-spacing: 0.03em; margin-bottom: 2px; }
    .pd-dim-badge { font-size: 11px; color: var(--mid); letter-spacing: 0.04em; }
    .pd-rule { height: 1px; background: var(--lt); margin: 20px 0; }

    /* ── Config ─────────────────────────────────────────────── */
    .cfg-grp { margin-bottom: 18px; }
    .cfg-lbl { font-size: 9px; font-weight: 700; letter-spacing: 0.2em; text-transform: uppercase; color: #BBB; margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }
    .cfg-val { font-size: 9px; font-weight: 600; letter-spacing: 0.06em; text-transform: none; color: var(--blk); }
    .pills { display: flex; flex-wrap: wrap; gap: 6px; }
    .pill { display: inline-flex; align-items: center; padding: 8px 14px; border: 1.5px solid var(--lt); background: var(--wht); color: #666; font-family: inherit; font-size: 11px; font-weight: 500; letter-spacing: 0.02em; cursor: pointer; transition: border-color 0.1s, background 0.1s, color 0.1s; -webkit-user-select: none; user-select: none; }
    .pill:hover { border-color: #999; color: var(--blk); }
    .pill.on { border-color: var(--blk); background: var(--blk); color: var(--wht); }
    .pill-sub { font-size: 9px; color: #AAA; margin-left: 5px; font-weight: 400; }
    .pill.on .pill-sub { color: rgba(255,255,255,0.45); }

    /* ── Product type cards ──────────────────────────────────── */
    .prod-cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(96px, 1fr)); gap: 7px; }
    .prod-card { display: flex; flex-direction: column; border: 1.5px solid var(--lt); background: var(--wht); cursor: pointer; transition: border-color 0.12s, box-shadow 0.12s; padding: 0; overflow: hidden; -webkit-user-select: none; user-select: none; text-align: left; font-family: inherit; }
    .prod-card:hover { border-color: #999; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
    .prod-card.on { border-color: var(--blk); box-shadow: 0 2px 8px rgba(0,0,0,0.10); }
    .card-img { width: 100%; aspect-ratio: 4/3; background: var(--off); overflow: hidden; }
    .card-img img { width: 100%; height: 100%; object-fit: contain; display: block; }
    .card-img-ph { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; color: #CCC; font-size: 9px; letter-spacing: 0.08em; }
    .card-lbl { padding: 7px 9px 8px; }
    .card-name { font-size: 11px; font-weight: 600; letter-spacing: 0.01em; color: var(--blk); line-height: 1.25; display: block; }
    .card-sub { font-size: 9px; color: var(--mid); margin-top: 2px; line-height: 1.35; display: block; }

    /* ── Features ───────────────────────────────────────────── */
    .pd-desc { font-size: 13px; line-height: 1.8; color: #444; margin-bottom: 16px; }
    .pd-feats { list-style: none; margin-bottom: 16px; }
    .pd-feats li { font-size: 12px; color: #555; padding: 5px 0 5px 16px; position: relative; line-height: 1.5; border-bottom: 1px solid var(--lt); }
    .pd-feats li:last-child { border-bottom: none; }
    .pd-feats li::before { content: '—'; position: absolute; left: 0; color: var(--red); font-size: 10px; top: 6px; }

    /* ── Assembly warning ───────────────────────────────────── */
    .asm-warn { background: #FFFBF0; border: 1px solid #EDD96A; padding: 12px 14px; margin-bottom: 20px; }
    .asm-warn-title { font-size: 9px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: #8B6914; margin-bottom: 7px; }
    .asm-warn ul { list-style: none; }
    .asm-warn ul li { font-size: 11px; color: #6B5010; padding: 2px 0 2px 14px; position: relative; line-height: 1.5; }
    .asm-warn ul li::before { content: '!'; position: absolute; left: 0; font-weight: 800; color: #C49A14; font-size: 10px; }

    /* ── Shipping / CTA ─────────────────────────────────────── */
    .ship-row { display: flex; align-items: center; gap: 10px; margin-bottom: 22px; flex-wrap: wrap; }
    .ship-badge { font-size: 9px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: #2A7A3B; background: #EBF7EE; padding: 4px 10px; }
    .ship-note { font-size: 11px; color: var(--mid); }
    .btn-cart { display: block; width: 100%; padding: 16px; background: var(--red); color: var(--wht); border: none; font-family: inherit; font-size: 10px; font-weight: 700; letter-spacing: 0.16em; text-transform: uppercase; cursor: pointer; margin-bottom: 8px; transition: background 0.12s; }
    .btn-cart:hover { background: #B00016; }
    .btn-sec { display: block; width: 100%; padding: 12px; background: transparent; color: var(--mid); border: 1px solid var(--lt); font-family: inherit; font-size: 10px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; cursor: pointer; margin-bottom: 18px; transition: all 0.12s; }
    .btn-sec:hover { border-color: var(--blk); color: var(--blk); }
    .cta-row { display: flex; gap: 8px; margin-bottom: 8px; }
    .cta-row .btn-cart { flex: 3; margin-bottom: 0; }
    .btn-plans { flex: 2; display: block; padding: 16px 10px; background: var(--blk); color: var(--wht); border: none; font-family: inherit; font-size: 10px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; cursor: pointer; transition: background 0.12s; white-space: nowrap; }
    .btn-plans:hover { background: #333; }
    .pd-trust { font-size: 10px; color: #CCC; letter-spacing: 0.04em; text-align: center; line-height: 1.6; }

    /* ── Modal ──────────────────────────────────────────────── */
    .modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 100; display: flex; align-items: center; justify-content: center; }
    .modal { background: var(--wht); width: 400px; max-width: 90vw; }
    .modal-hd { display: flex; justify-content: space-between; align-items: center; padding: 18px 22px; border-bottom: 1px solid var(--blk); }
    .modal-ti { font-size: 9px; font-weight: 700; letter-spacing: 0.2em; text-transform: uppercase; }
    .modal-x { background: none; border: none; font-size: 20px; cursor: pointer; color: var(--blk); line-height: 1; }
    .modal-bd { padding: 22px; }
    .modal-sp { font-size: 12px; line-height: 1.8; color: #555; margin-bottom: 18px; padding-bottom: 16px; border-bottom: 1px solid var(--lt); }
    .modal-sp strong { color: var(--blk); }
    .mf { margin-bottom: 12px; }
    .mf label { display: block; font-size: 8px; font-weight: 700; letter-spacing: 0.18em; text-transform: uppercase; color: var(--mid); margin-bottom: 4px; }
    .mf input, .mf textarea { width: 100%; padding: 9px 11px; border: 1px solid var(--red); font-family: inherit; font-size: 12px; outline: none; }
    .mf textarea { resize: vertical; min-height: 50px; }
    .mf input:focus, .mf textarea:focus { border-color: var(--blk); }
    .modal-go { width: 100%; padding: 13px; background: var(--red); color: var(--wht); border: none; font-family: inherit; font-size: 9px; font-weight: 700; letter-spacing: 0.15em; text-transform: uppercase; cursor: pointer; margin-top: 4px; }
    .modal-go:hover { background: #B00016; }

    /* ── Mobile product nav ─────────────────────────────────── */
    .mob-prodnav {
      display: none;
      position: fixed; bottom: 0; left: 0; right: 0;
      background: var(--wht); border-top: 1px solid var(--lt);
      z-index: 15; overflow-x: auto; -webkit-overflow-scrolling: touch;
      padding: 0;
      scrollbar-width: none;
    }
    .mob-prodnav::-webkit-scrollbar { display: none; }
    .mob-prodnav-inner { display: flex; white-space: nowrap; padding: 0 8px; }
    .mob-prodtab {
      flex: 0 0 auto; padding: 12px 14px;
      font-size: 9px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase;
      color: var(--mid); background: none; border: none; border-top: 2.5px solid transparent;
      cursor: pointer; font-family: inherit;
      transition: color 0.1s, border-color 0.1s;
    }
    .mob-prodtab.on { color: var(--blk); border-top-color: var(--red); }

    @media (max-width: 800px) {
      .product-pg { grid-template-columns: 1fr; grid-template-rows: 40vh 1fr; }
      .hd-nav { display: none; }
      .pd-inner { padding: 18px 20px 72px; } /* extra bottom padding for mobile nav */
      .pd-name { font-size: 20px; }
      .mob-prodnav { display: block; }
    }
  </style>
</head>
<body>

<header class="site-hd">
  <div class="hd-inner">
    <a class="logo" href="index.html">Ben<span>·</span>Studios</a>
    <nav class="hd-nav" id="hd-nav">
      <a onclick="location.href='index.html'">Shop</a>
      <a onclick="location.href='index.html#about'">About</a>
    </nav>
  </div>
</header>

<div class="product-pg">
  <div class="viewer-wrap" id="viewer">
    <canvas id="canvas"></canvas>
    <div class="viewer-dim" id="b-dim">—</div>
    <div class="viewer-hint">Drag to rotate · Scroll to zoom</div>
  </div>
  <div class="pd-panel">
    <div class="pd-inner">
      <div id="pd-content"></div>
    </div>
  </div>
</div>

<!-- Mobile bottom nav removed — product selection now via flat card grid -->

<div class="modal-bg" id="modal-plans" style="display:none" onclick="if(event.target===this)closePlans()">
  <div class="modal">
    <div class="modal-hd">
      <span class="modal-ti">Order Build Plans — $40</span>
      <button class="modal-x" onclick="closePlans()">×</button>
    </div>
    <div class="modal-bd">
      <div class="modal-sp" id="plans-spec"></div>
      <div class="mf"><label>Name</label><input id="p-name" placeholder="Your full name"></div>
      <div class="mf"><label>Email</label><input id="p-email" type="email" placeholder="you@email.com"></div>
      <button class="modal-go" onclick="sendPlans()">Order Plans — $40</button>
    </div>
  </div>
</div>

<div class="modal-bg" id="modal" style="display:none" onclick="if(event.target===this)closeQ()">
  <div class="modal">
    <div class="modal-hd">
      <span class="modal-ti">Place Your Order</span>
      <button class="modal-x" onclick="closeQ()">×</button>
    </div>
    <div class="modal-bd">
      <div class="modal-sp" id="m-spec"></div>
      <div class="mf"><label>Name</label><input id="q-name" placeholder="Your full name"></div>
      <div class="mf"><label>Email</label><input id="q-email" type="email" placeholder="you@email.com"></div>
      <div class="mf"><label>Notes</label><textarea id="q-notes" placeholder="Delivery address, special requests..."></textarea></div>
      <button class="modal-go" onclick="sendQ()">Confirm Order</button>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════
//  Constants
// ═══════════════════════════════════════════════════════════════
const T = 0.75, SHEET = 3600, SPR = 150, WASTE = 1.1, MARGIN = 0.40;
const SELLER = 'hello@benstudios.com';
const FACE = [200,172,128], EDGE = [155,126,88];

// ═══════════════════════════════════════════════════════════════
//  Three.js setup
// ═══════════════════════════════════════════════════════════════
const canvas = document.getElementById('canvas');
const ren = new THREE.WebGLRenderer({ canvas, antialias: true });
ren.setPixelRatio(Math.min(window.devicePixelRatio, 2));
ren.shadowMap.enabled = true;
ren.shadowMap.type = THREE.PCFSoftShadowMap;
ren.outputEncoding = THREE.sRGBEncoding;
ren.physicallyCorrectLights = true;
ren.toneMapping = THREE.ACESFilmicToneMapping;
ren.toneMappingExposure = 1.4;

const scene = new THREE.Scene();
scene.background = new THREE.Color(0xF5F1EB);
const cam = new THREE.PerspectiveCamera(34, 1, 0.1, 10000);

scene.add(new THREE.HemisphereLight(0xFFF8EE, 0xE0D8C8, 0.8));
const sun = new THREE.DirectionalLight(0xFFFBF0, 3.5);
sun.position.set(80, 180, 100); sun.castShadow = true;
sun.shadow.mapSize.set(2048, 2048);
Object.assign(sun.shadow.camera, { left:-200, right:200, top:200, bottom:-200, near:1, far:600 });
sun.shadow.bias = -0.0005; scene.add(sun);
const fill = new THREE.DirectionalLight(0xDDE4FF, 1.2);
fill.position.set(-60, 50, -50); scene.add(fill);

const gnd = new THREE.Mesh(new THREE.PlaneGeometry(3000,3000), new THREE.MeshStandardMaterial({ color:0xF5F1EB, roughness:1, metalness:0 }));
gnd.rotation.x = -Math.PI/2; gnd.receiveShadow = true; scene.add(gnd);
const gr = new THREE.GridHelper(800, 80, 0xDBD7CF, 0xE6E2DC);
gr.material.opacity = 0.4; gr.material.transparent = true; scene.add(gr);

// ═══════════════════════════════════════════════════════════════
//  Procedural textures
// ═══════════════════════════════════════════════════════════════
function mkFTex(r,g,b) {
  const SZ=1024, c=document.createElement('canvas'); c.width=SZ; c.height=SZ;
  const x=c.getContext('2d');
  x.fillStyle=`rgb(${r},${g},${b})`; x.fillRect(0,0,SZ,SZ);
  for(let y=0;y<SZ;y++){
    const wave=Math.sin(y*0.018)*6+Math.sin(y*0.042+1.3)*3+Math.sin(y*0.091+2.7)*1.2;
    const band=Math.sin(y*0.11+wave*0.08)*0.5+0.5;
    const alpha=0.008+band*0.018;
    x.fillStyle=`rgba(${r-30},${g-28},${r-55},${alpha})`; x.fillRect(0,y,SZ,1);
  }
  for(let i=0;i<4;i++){
    const by=Math.random()*SZ, bh=60+Math.random()*140, shift=Math.random()>0.5?8:-6;
    const gd=x.createLinearGradient(0,by,0,by+bh);
    gd.addColorStop(0,`rgba(${r+shift},${g+shift},${b+shift*0.5},0)`);
    gd.addColorStop(0.5,`rgba(${r+shift},${g+shift},${b+shift*0.5},0.04)`);
    gd.addColorStop(1,`rgba(${r+shift},${g+shift},${b+shift*0.5},0)`);
    x.fillStyle=gd; x.fillRect(0,by,SZ,bh);
  }
  const t=new THREE.CanvasTexture(c); t.encoding=THREE.sRGBEncoding; t.wrapS=t.wrapT=THREE.RepeatWrapping; return t;
}
function mkETex(r,g,b) {
  const c=document.createElement('canvas'); c.width=16; c.height=128;
  const x=c.getContext('2d'); const pl=13, ph=c.height/pl;
  for(let i=0;i<pl;i++){
    const y=i*ph;
    x.fillStyle=i%2===0?`rgb(${r+15},${g+15},${b+10})`:`rgb(${r-10},${g-10},${b-8})`;
    x.fillRect(0,y,c.width,ph);
    x.fillStyle=`rgba(${r-40},${g-40},${b-20},0.55)`; x.fillRect(0,y,c.width,0.8);
  }
  const t=new THREE.CanvasTexture(c); t.encoding=THREE.sRGBEncoding; t.wrapS=t.wrapT=THREE.RepeatWrapping; t.magFilter=THREE.NearestFilter; return t;
}
function mkETexV(r,g,b) {
  const c=document.createElement('canvas'); c.width=128; c.height=16;
  const x=c.getContext('2d'); const pl=13, pw=c.width/pl;
  for(let i=0;i<pl;i++){
    const xp=i*pw;
    x.fillStyle=i%2===0?`rgb(${r+15},${g+15},${b+10})`:`rgb(${r-10},${g-10},${b-8})`;
    x.fillRect(xp,0,pw,c.height);
    x.fillStyle=`rgba(${r-40},${g-40},${b-20},0.55)`; x.fillRect(xp,0,0.8,c.height);
  }
  const t=new THREE.CanvasTexture(c); t.encoding=THREE.sRGBEncoding; t.wrapS=t.wrapT=THREE.RepeatWrapping; t.magFilter=THREE.NearestFilter; return t;
}

// Edge banding material — solid maple-toned wood strip, no plywood layers visible
function mkEBTex(r,g,b) {
  const SZ=256, c=document.createElement('canvas'); c.width=SZ; c.height=SZ;
  const x=c.getContext('2d');
  x.fillStyle=`rgb(${r},${g},${b})`; x.fillRect(0,0,SZ,SZ);
  // Subtle long-grain lines (face grain on the banding)
  for(let i=0;i<SZ;i++){
    const alpha=0.025*(Math.sin(i*0.09+0.8)*0.5+0.5);
    x.fillStyle=`rgba(${r-20},${g-18},${b-14},${alpha})`; x.fillRect(0,i,SZ,1);
  }
  const t=new THREE.CanvasTexture(c); t.encoding=THREE.sRGBEncoding; t.wrapS=t.wrapT=THREE.RepeatWrapping; return t;
}
// Edge banding color — slightly lighter warm maple tone
const EB_COLOR = [215, 188, 148];

let mF, mFT, mE, mEV;
// Global finish state — 'oiled' | 'edgeband'
let finishState = 'oiled';

function buildMats() {
  mF  = new THREE.MeshStandardMaterial({ map:mkFTex(...FACE), roughness:0.55, metalness:0 });
  mFT = new THREE.MeshStandardMaterial({ map:mkFTex(FACE[0]+8,FACE[1]+8,FACE[2]+5), roughness:0.55, metalness:0 });
  if (finishState === 'edgeband') {
    // Edge banding: solid wood strip — no plywood stripes
    const ebm = new THREE.MeshStandardMaterial({ map:mkEBTex(...EB_COLOR), roughness:0.48, metalness:0 });
    mE  = ebm;
    mEV = ebm.clone();
  } else {
    mE  = new THREE.MeshStandardMaterial({ map:mkETex(...EDGE), roughness:0.65, metalness:0 });
    mEV = new THREE.MeshStandardMaterial({ map:mkETexV(...EDGE), roughness:0.65, metalness:0 });
  }
}
const mMetal = new THREE.MeshStandardMaterial({ color:0x707070, roughness:0.3, metalness:0.9 });

// Face material arrays for common orientations:
// Flat panel (top/bottom face visible): BoxGeometry(W, T, D)
//   face 0,1 = narrow front/back edge (mE horiz), face 2 = top (mFT), face 3 = bottom (mF), face 4,5 = side edges (mE)
function mFlat() { return [mE.clone(),mE.clone(),mFT.clone(),mF.clone(),mE.clone(),mE.clone()]; }
// Standing panel (faces visible): BoxGeometry(T, H, D)
//   face 0,1 = large face (mF), face 2,3 = top/bottom (mE horiz), face 4,5 = front/back thin edge (mEV vert)
function mStand() { return [mF.clone(),mF.clone(),mE.clone(),mE.clone(),mEV.clone(),mEV.clone()]; }
// Leg (all faces visible, showing face grain): BoxGeometry(lw, H, lw)
function mLeg() { return [mF.clone(),mF.clone(),mE.clone(),mE.clone(),mF.clone(),mF.clone()]; }

function eL(m,g) { m.add(new THREE.LineSegments(new THREE.EdgesGeometry(g), new THREE.LineBasicMaterial({ color:0x604010, transparent:true, opacity:0.18 }))); }

const grp = new THREE.Group(); scene.add(grp);
function clearGrp() {
  while(grp.children.length) {
    const o = grp.children[0];
    if(o.geometry) o.geometry.dispose();
    if(o.children) o.children.forEach(c=>{ if(c.geometry) c.geometry.dispose(); });
    grp.remove(o);
  }
}

// ═══════════════════════════════════════════════════════════════
//  Camera
// ═══════════════════════════════════════════════════════════════
let th=0, ph=0.25, zm=1, isDrag=false, lx=0, ly=0;
let camCt = { x:0, y:15, z:0 }, camSc = 80;
function updCam() {
  const d = camSc * zm;
  const t = new THREE.Vector3(camCt.x, camCt.y, camCt.z);
  cam.position.set(t.x + d*Math.cos(ph)*Math.sin(th), t.y + d*Math.sin(ph), t.z + d*Math.cos(ph)*Math.cos(th));
  cam.lookAt(t); cam.updateProjectionMatrix();
}
canvas.addEventListener('mousedown', e => { isDrag=true; lx=e.clientX; ly=e.clientY; });
window.addEventListener('mousemove', e => { if(!isDrag) return; th-=(e.clientX-lx)*0.006; ph=Math.max(0.04,Math.min(1.15,ph-(e.clientY-ly)*0.005)); lx=e.clientX; ly=e.clientY; updCam(); });
window.addEventListener('mouseup', () => isDrag=false);
canvas.addEventListener('wheel', e => { e.preventDefault(); zm=Math.max(0.3,Math.min(3.5,zm*(1+e.deltaY*0.0008))); updCam(); }, { passive:false });
let tt=null;
canvas.addEventListener('touchstart', e => { if(e.touches.length===1) tt={x:e.touches[0].clientX,y:e.touches[0].clientY}; });
canvas.addEventListener('touchmove', e => { e.preventDefault(); if(!tt||e.touches.length!==1) return; th-=(e.touches[0].clientX-tt.x)*0.006; ph=Math.max(0.04,Math.min(1.15,ph-(e.touches[0].clientY-tt.y)*0.005)); tt={x:e.touches[0].clientX,y:e.touches[0].clientY}; updCam(); }, { passive:false });
canvas.addEventListener('touchend', () => tt=null);

//  Pricing helper (40% gross margin)
// ═══════════════════════════════════════════════════════════════
function calcRetail(sqIn, labor, oilCost, shipCost) {
  // Per-sqIn material rate — assumes batched CNC jobs (no full-sheet penalty)
  const rate = SPR * WASTE / SHEET; // $/sqIn
  const mat = sqIn * rate;
  const sheets = +(mat / SPR).toFixed(2); // fractional sheets, for reference
  const cost = mat + labor + oilCost + shipCost;
  return { sheets, mat, labor, cost, retail: Math.ceil(cost / (1 - MARGIN) / 10) * 10 };
}

// Small accessories — per-sqIn rate, no full-sheet rounding
function calcAccessoryRetail(sqIn, labor, oilCost, shipCost) {
  const mat = sqIn * (SPR * WASTE / SHEET); // ~$0.062/sqIn
  const cost = mat + labor + oilCost + shipCost;
  return { retail: Math.ceil(cost / (1 - MARGIN) / 5) * 5 };
}

//  Product switching
// ═══════════════════════════════════════════════════════════════
let curProd = PRODS[0];
let noTypeSelected = true; // true until user explicitly picks a style

function switchProd(id) {
  curProd = PRODS.find(p => p.id===id) || PRODS[0];
  noTypeSelected = true;
  zm=1; th=0; ph=0.25;
  syncNav();
  clearGrp();
  renderPanel();
}

// Flat product selector — pick a specific type across any category
function selectType(prodId, ty) {
  const pr = PRODS.find(p => p.id === prodId);
  if (!pr) return;
  const changed = curProd.id !== prodId;
  curProd = pr;
  curProd.state.ty = ty;
  if (curProd.onTypeChange) curProd.onTypeChange();
  noTypeSelected = false;
  if (changed) { zm=1; th=0; ph=0.25; }
  clearGrp();
  curProd.build(curProd.state);
  updCam();
  syncNav();
  renderPanel();
}

function rebuild() {
  clearGrp();
  if(!noTypeSelected) { curProd.build(curProd.state); updCam(); }
  renderPanel();
}

function setOpt(key, val) {
  curProd.state[key] = val;
  if(key === 'ty') {
    if(curProd.onTypeChange) curProd.onTypeChange();
    noTypeSelected = false; // style chosen — now we can render
  }
  clearGrp();
  if(!noTypeSelected) { curProd.build(curProd.state); updCam(); }
  renderPanel();
}

function setFinish(val) {
  finishState = val;
  clearGrp();
  curProd.build(curProd.state); // rebuilds with new mats
  updCam();
  renderPanel();
}

function editionNum(state) {
  const hash = Object.values(state).reduce((a,v) => a*7+v, 1);
  return String(((hash % 73) + 1)).padStart(3,'0');
}

// ═══════════════════════════════════════════════════════════════
let _tr = null, _trCv = null;
function _initTR() {
  if (_tr) return;
  _trCv = document.createElement('canvas');
  _trCv.width = 240; _trCv.height = 180;
  _tr = new THREE.WebGLRenderer({ canvas: _trCv, antialias: true, alpha: false });
  _tr.setPixelRatio(1);
  _tr.setClearColor(0xF5F1EB, 1);
  _tr.outputEncoding = THREE.sRGBEncoding;
  _tr.toneMapping = THREE.ACESFilmicToneMapping;
  _tr.toneMappingExposure = 1.2;
}

// Simple flat-colour materials for thumbnails (can't share textures across contexts)
const _FC = 0xC0AC82, _EC = 0x9B7E58;
function _mF2() { return new THREE.MeshStandardMaterial({ color:_FC, roughness:0.55, metalness:0 }); }
function _mE2() { return new THREE.MeshStandardMaterial({ color:_EC, roughness:0.65, metalness:0 }); }
function _mS2() { return [_mF2(),_mF2(),_mE2(),_mE2(),_mE2(),_mE2()]; } // standing panel
function _mL2() { return [_mE2(),_mE2(),_mF2(),_mF2(),_mE2(),_mE2()]; } // flat/lying panel

function _b(w,h,d, mat, px,py,pz, parent) {
  const m = new THREE.Mesh(new THREE.BoxGeometry(w,h,d), mat);
  m.position.set(px,py,pz); parent.add(m);
}

function buildPreview(id, ty) {
  const g  = new THREE.Group();
  const pr = PRODS.find(p => p.id === id);
  if (!pr) return g;
  const st = { ty, c0:0, c1:0, c2:0 };

  if (id === 'tables') {
    if (ty === 0) {                              // Dining — trestle
      const d = pr.types[0].getDims(st);
      _b(d.L,T,d.W, _mL2(), 0,d.H-T/2,0, g);
      [d.L/2-d.recess-T/2, -(d.L/2-d.recess-T/2)].forEach(xp => _b(T,d.panelH,d.baseW, _mS2(), xp,d.panelH/2,0, g));
      _b(d.webLen,d.panelH,T, _mS2(), 0,d.panelH/2,0, g);
    } else if (ty === 1) {                       // Coffee — trestle
      const d = pr.types[1].getDims(st);
      _b(d.L,T,d.W, _mL2(), 0,d.H-T/2,0, g);
      [d.L/2-d.recess-T/2, -(d.L/2-d.recess-T/2)].forEach(xp => _b(T,d.panelH,d.baseW, _mS2(), xp,d.panelH/2,0, g));
      _b(d.webLen,d.panelH,T, _mS2(), 0,d.panelH/2,0, g);
    } else if (ty === 2) {                       // Coffee + Shelf — box
      const d = pr.types[2].getDims(st);
      _b(d.L,T,d.W+1, _mL2(), 0,d.H-T/2,0.5, g);
      [-1,1].forEach(s => _b(T,d.epH,d.W, _mS2(), s*(d.L/2-T/2),d.epH/2,0, g));
      _b(d.innerL,T,d.W, _mL2(), 0,d.shelfY,0, g);
    } else if (ty === 3) {                       // Side Table — box
      const d = pr.types[3].getDims(st);
      _b(d.L,T,d.W+1, _mL2(), 0,d.H-T/2,0.5, g);
      _b(d.L,T,d.W, _mL2(), 0,T/2,0, g);
      [-1,1].forEach(s => _b(T,d.innerH,d.W, _mS2(), s*(d.L/2-T/2),T+d.innerH/2,0, g));
      _b(d.L-2*T,T,d.W, _mL2(), 0,d.shelfY,0, g);
    } else if (ty === 4) {                       // Desk (rear shelf)
      const W=48, D=24, H=29.5, shelfY=8, iW=W-2*T;
      const shelfD=D/2, shelfZ=-(D/2-shelfD/2);
      _b(W,T,D+1, _mL2(), 0,H-T/2,0.5, g);
      [-1,1].forEach(s => _b(T,H-T,D, _mS2(), s*(W/2-T/2),(H-T)/2,0, g));
      _b(iW,T,shelfD, _mL2(), 0,shelfY,shelfZ, g);
    }
  } else if (id === 'shelving') {
    if (ty === 0) {                              // Freestanding bookcase
      const d = pr.types[0].getDims(st);
      const gap = (d.H-T)/(d.nShelves-1), shW = d.W-2*T;
      [-1,1].forEach(s => _b(T,d.H,d.D, _mS2(), s*(d.W/2-T/2),d.H/2,0, g));
      for(let i=0;i<d.nShelves;i++) _b(shW,T,d.D, _mL2(), 0,i*gap+T/2,0, g);
      _b(d.W,T,d.D+1, _mL2(), 0,d.H+T/2,0.5, g);
    } else if (ty === 1) {                       // Wall shelf (floating)
      const d = pr.types[1].getDims(st);
      const cy = d.H/2;
      _b(d.L,T,d.D, _mL2(), 0,cy+d.H/2-T/2,0, g);
      _b(d.L,T,d.D, _mL2(), 0,cy-d.H/2+T/2,0, g);
      [-1,1].forEach(s => _b(T,d.innerH,d.D, _mS2(), s*(d.L/2-T/2),cy,0, g));
      const compH = d.innerH/(d.shelves+1);
      for(let i=1;i<=d.shelves;i++) _b(d.innerL,T,d.D, _mL2(), 0,(cy-d.H/2+T)+compH*i,0, g);
    }
  } else if (id === 'seating') {
    if (ty === 0) {                              // Entryway bench
      const d = pr.types[0].getDims(st);
      _b(d.W,T,d.D+1, _mL2(), 0,d.H-T/2,0.5, g);
      [-1,1].forEach(s => _b(T,d.H-T,d.D, _mS2(), s*(d.W/2-T/2),(d.H-T)/2,0, g));
      _b(d.W-2*T,T,d.D, _mL2(), 0,d.shelfY,0, g);
    } else if (ty === 1) {                       // Stool
      const d = pr.types[1].getDims(st);
      _b(d.W,T,d.D+1, _mL2(), 0,d.H-T/2,0.5, g);
      [-1,1].forEach(s => _b(T,d.innerH,d.D, _mS2(), s*(d.W/2-T/2),d.innerH/2,0, g));
      _b(d.innerW,d.innerH,T, _mS2(), 0,d.innerH/2,-(d.D/2-T/2), g);
      _b(d.innerW,T,d.D, _mL2(), 0,d.stretcherY,0, g);
    } else if (ty === 2) {                       // Daybed — 2 open-front boxes
      const BW=37,BD=37,BH=16,iH=BH-2*T,gap=2,ox=BW/2+gap/2;
      [[-ox,0],[+ox,0]].forEach(([cx,cz]) => {
        _b(BW,T,BD, _mL2(), cx,T/2,cz, g);
        _b(BW,T,BD, _mL2(), cx,BH-T/2,cz, g);
        _b(BW-2*T,iH,T, _mS2(), cx,T+iH/2,cz-BD/2+T/2, g);    // inner-width back
        _b(T,iH-0.02,BD, _mS2(), cx-BW/2+T/2,T+iH/2,cz, g);   // sides clear top/bottom
        _b(T,iH-0.02,BD, _mS2(), cx+BW/2-T/2,T+iH/2,cz, g);
      });
    } else if (ty === 3) {                       // Daybed Supreme (2×2 bed view)
      const BW=37, BD=37, BH=16, iH=BH-2*T, gap=2;
      const ox=BW/2+gap/2, oz=BD/2+gap/2;
      [[-ox,-oz],[ox,-oz],[-ox,oz],[ox,oz]].forEach(([cx,cz]) => {
        _b(BW,T,BD, _mL2(), cx,T/2,cz, g);
        _b(BW,T,BD, _mL2(), cx,BH-T/2,cz, g);
        _b(BW-2*T,iH,T, _mS2(), cx,T+iH/2,cz-BD/2+T/2, g);    // inner-width back
        _b(T,iH-0.02,BD, _mS2(), cx-BW/2+T/2,T+iH/2,cz, g);   // sides clear top/bottom
        _b(T,iH-0.02,BD, _mS2(), cx+BW/2-T/2,T+iH/2,cz, g);
      });
    } else if (ty === 4) {                       // Chair
      const W=19, D=16, SH=17.5, BH=28, backH=BH-SH-T, iW=W-2*T;
      [-1,1].forEach(s => _b(T,BH,D, _mS2(), s*(W/2-T/2),BH/2,0, g));
      _b(iW,T,D, _mL2(), 0,SH,0, g);
      _b(iW,backH,T, _mS2(), 0,SH+T+backH/2,-(D/2-T/2), g);
    }
  } else if (id === 'frames') {                  // Canvas Frame — default 8×10, 1.5" tray
    const cW=8, cH=10, sH=1.5;
    const oW=cW+2*T, oH=cH+2*T, wY=oH/2+2;
    _b(cW-0.02,cH-0.02,T, _mF2(), 0,wY,T/2, g);             // back panel
    _b(oW,T,sH, _mF2(), 0,wY+cH/2+T/2,0.01+sH/2, g);       // top strip
    _b(oW,T,sH, _mF2(), 0,wY-cH/2-T/2,0.01+sH/2, g);       // bottom strip
    _b(T,cH-0.02,sH, _mF2(), -(cW/2+T/2),wY,0.01+sH/2, g); // left strip
    _b(T,cH-0.02,sH, _mF2(), +(cW/2+T/2),wY,0.01+sH/2, g); // right strip
    const cm=new THREE.Mesh(new THREE.BoxGeometry(cW*0.98,cH*0.98,0.1),
      new THREE.MeshStandardMaterial({color:0xEDE7D6,roughness:0.9,metalness:0}));
    cm.position.set(0,wY,T+0.05); g.add(cm);
  }
  return g;
}

const _thumbCache = {};
function getThumb(id, ty) {
  const key = `${id}__${ty}`;
  if (_thumbCache[key]) return _thumbCache[key];
  _initTR();

  // Build mini scene
  const sc = new THREE.Scene();
  sc.background = new THREE.Color(0xF5F1EB);
  sc.add(new THREE.HemisphereLight(0xFFF8EE, 0xE0D8C8, 0.85));
  const sun2 = new THREE.DirectionalLight(0xFFFBF0, 3.0); sun2.position.set(80,180,100); sc.add(sun2);
  const fill2 = new THREE.DirectionalLight(0xDDE4FF, 1.0); fill2.position.set(-60,50,-50); sc.add(fill2);

  const grp2 = buildPreview(id, ty);
  sc.add(grp2);

  // Auto-fit camera to bounding box
  const bbox = new THREE.Box3().setFromObject(grp2);
  const ctr  = bbox.getCenter(new THREE.Vector3());
  const sz   = bbox.getSize(new THREE.Vector3());
  const maxD = Math.max(sz.x, sz.y, sz.z);
  const cam2 = new THREE.PerspectiveCamera(36, 240/180, 0.1, 10000);
  const dist = maxD * 2.0;
  cam2.position.set(ctr.x + dist*0.65, ctr.y + dist*0.45, ctr.z + dist*0.85);
  cam2.lookAt(ctr);
  cam2.updateProjectionMatrix();

  _tr.render(sc, cam2);
  const url = _trCv.toDataURL('image/jpeg', 0.88);
  _thumbCache[key] = url;

  // Dispose mini scene
  grp2.traverse(o => {
    if (o.geometry) o.geometry.dispose();
    if (o.material) { (Array.isArray(o.material)?o.material:[o.material]).forEach(m=>m.dispose()); }
  });
  return url;
}

function renderPanel() {
  const p=curProd, st=p.state;
  let html='';

  // ── Product picker — all types across all categories, flat grid ─
  html += `<div class="cfg-grp"><div class="cfg-lbl">Product${!noTypeSelected?` <span class="cfg-val">— ${p.types[st.ty].typeLabel}</span>`:''}</div><div class="prod-cards">`;
  PRODS.forEach(pr => {
    pr.types.forEach((t,i) => {
      const isOn = !noTypeSelected && pr.id===p.id && i===st.ty;
      const imgSrc = getThumb(pr.id, i);
      html += `<button class="prod-card${isOn?' on':''}" onclick="selectType('${pr.id}',${i})">` +
        `<div class="card-img"><img src="${imgSrc}" alt="${t.typeLabel}" loading="lazy"></div>` +
        `<div class="card-lbl"><span class="card-name">${t.typeLabel}</span>${t.typeSub?`<span class="card-sub">${t.typeSub}</span>`:''}</div>` +
        `</button>`;
    });
  });
  html += `</div></div>`;

  // ── No type chosen yet — stop here ──────────────────────────
  if(noTypeSelected) {
    document.getElementById('pd-content').innerHTML = html;
    return;
  }

  // ── 3. Dimension / option pickers for the chosen type ────────
  p.types[st.ty].configs.forEach(cfg => {
    const cur=st[cfg.key];
    html += `<div class="cfg-grp"><div class="cfg-lbl">${cfg.label} <span class="cfg-val">— ${cfg.items[cur].lb}</span></div><div class="pills">`;
    cfg.items.forEach((item,i) => {
      html += `<button class="pill${i===cur?' on':''}" onclick="setOpt('${cfg.key}',${i})">${item.lb}${item.sub?`<span class="pill-sub">${item.sub}</span>`:''}</button>`;
    });
    html += `</div></div>`;
  });

  // ── 4. Finish / edge banding ─────────────────────────────────
  const ebOn = finishState === 'edgeband';
  html += `<div class="cfg-grp">
    <div class="cfg-lbl">Finish</div>
    <div style="display:flex;align-items:center;gap:10px;padding:9px 14px;border:1.5px solid var(--blk);background:var(--off);margin-bottom:6px;">
      <span style="font-size:11px;font-weight:600;letter-spacing:0.02em;">Oiled</span>
      <span style="font-size:9px;color:#AAA;text-transform:uppercase;letter-spacing:0.08em;">standard · all pieces</span>
    </div>
    <label style="display:flex;align-items:center;gap:10px;padding:9px 14px;border:1.5px solid ${ebOn?'var(--blk)':'var(--lt)'};background:${ebOn?'var(--blk)':'var(--wht)'};color:${ebOn?'var(--wht)':'#555'};cursor:pointer;transition:all 0.1s;user-select:none;">
      <input type="checkbox" ${ebOn?'checked':''} onchange="setFinish(this.checked?'edgeband':'oiled')" style="width:13px;height:13px;cursor:pointer;accent-color:${ebOn?'#fff':'var(--blk)'};">
      <span style="font-size:11px;font-weight:500;">+ Edge Band</span>
      <span style="font-size:10px;${ebOn?'color:rgba(255,255,255,0.5)':'color:#AAA'};margin-left:auto;">+$${EB_UPCHARGE}</span>
    </label>
    <div style="font-size:10px;color:#AAA;margin-top:8px;line-height:1.6;">Solid maple strip covers all exposed plywood edges — cleaner look, hides the layers.</div>
  </div>`;

  html += `<div class="pd-rule"></div>`;

  // ── 5. Product summary (name / price / dims) — after all selections
  const dims=p.getDims(st);
  const pr=p.price(st);
  const totalRetail=pr.retail+(finishState==='edgeband'?EB_UPCHARGE:0);
  const edNo=editionNum(st);

  html += `<h1 class="pd-name">${p.name}</h1>`;
  html += `<div class="edition-row">
    <span class="edition-badge">${p.modelPrefix} · No.&nbsp;${edNo} / 100</span>
    <span class="edition-no">Limited Edition</span>
  </div>`;
  html += `<div class="pd-price">$${totalRetail.toLocaleString()}</div>`;
  html += `<div class="pd-sub">${dims.subStr}</div>`;
  html += `<div class="pd-dim-badge">${dims.dimStr}</div>`;

  html += `<div class="pd-rule"></div>`;

  // ── 6. Description + features ────────────────────────────────
  html += `<p class="pd-desc">${p.desc}</p>`;
  html += `<ul class="pd-feats">`;
  p.features.forEach(f => { html += `<li>${f}</li>`; });
  html += `</ul>`;

  // ── 7. Assembly & safety ─────────────────────────────────────
  html += `<div class="asm-warn"><div class="asm-warn-title">Assembly &amp; Safety</div><ul>`;
  p.assembly.forEach(a => { html += `<li>${a}</li>`; });
  html += `</ul></div>`;

  // ── 8. CTA ───────────────────────────────────────────────────
  html += `<div class="ship-row"><span class="ship-badge">${p.ship.badge}</span><span class="ship-note">${p.ship.note}</span></div>`;
  html += `<div class="cta-row"><button class="btn-cart" onclick="openQ()">${p.ctaLabel}</button><button class="btn-plans" onclick="openPlans()">Order plans — $40</button></div>`;
  html += `<button class="btn-sec" onclick="downloadCSV()">↓ Download Production Packet</button>`;
  html += `<div class="pd-trust">Handcrafted in Brooklyn, NY<br>30-day satisfaction guarantee · Made to order</div>`;

  document.getElementById('pd-content').innerHTML = html;
}

function downloadCSV() {
  const p=curProd, st=p.state, d=p.getDims(st), pr=p.price(st);
  const q=v=>`"${String(v).replace(/"/g,'""')}"`;
  const edNo=editionNum(st);
  const fin=finishState==='edgeband'?'Oiled + Edge Band':'Oiled';
  const total=pr.retail+(finishState==='edgeband'?EB_UPCHARGE:0);
  const cuts=p.getCuts?p.getCuts(st):null;
  const R=[];

  R.push(q('BEN STUDIOS \u2014 PRODUCTION PACKET'));
  R.push(q(p.name.toUpperCase()+' \u2014 '+d.dimStr+' \u2014 '+fin));
  R.push(`${q('Model')},${q(p.modelPrefix+' \u00b7 No. '+edNo+' / 100')}`);
  R.push(`${q('Generated')},${q(new Date().toLocaleString())}`);
  R.push(`${q('Material')},${q('\u00be" Baltic Birch Plywood \u00b7 B/BB Grade \u00b7 void-free core')}`);
  R.push(`${q('Retail Price')},${q('$'+total+' incl. shipping')}`);
  R.push('');
  R.push(q('JOINERY SYSTEM: Dado joints (no glue) + CNC pocket holes. Customer drives screws only \u2014 no drilling, no glue. Include pocket hole operations in CNC RFQ.'));
  R.push('');

  if(cuts){
    R.push(q('PART LIST'));
    R.push([q('Part'),q('Qty'),q('L (in)'),q('W (in)'),q('T (in)'),q('Notes')].join(','));
    cuts.parts.forEach(pt=>{
      R.push([q(pt.name),q(pt.qty),q(pt.L),q(pt.W),q('0.75'),q(pt.notes||'')].join(','));
    });
    R.push('');

    if(cuts.cncOps&&cuts.cncOps.length){
      R.push(q('CNC OPERATIONS \u2014 all from the face of each panel. Pocket holes: 15\u00b0 angled bore (step drill \u00d8\u215c"). Include all in RFQ.'));
      R.push([q('Part(s)'),q('Operation'),q('Specification')].join(','));
      cuts.cncOps.forEach(op=>{R.push([q(op.part),q(op.op),q(op.spec)].join(','));});
      R.push('');
    }

    if(cuts.hardware&&cuts.hardware.length){
      R.push(q('HARDWARE (ship in bag with order)'));
      R.push([q('Item'),q('Qty'),q('Notes')].join(','));
      cuts.hardware.forEach(h=>{R.push([q(h.item),q(h.qty),q(h.notes||'')].join(','));});
      R.push('');
    }

    if(cuts.assembly&&cuts.assembly.length){
      R.push(q('CUSTOMER ASSEMBLY'));
      cuts.assembly.forEach((s,i)=>{R.push(`${q('Step '+(i+1))},${q(s)}`);});
    }
  }

  const blob=new Blob([R.join('\n')],{type:'text/csv;charset=utf-8;'});
  const url=URL.createObjectURL(blob);
  Object.assign(document.createElement('a'),{href:url,download:`benstudios_${p.id}_production_packet.csv`}).click();
  URL.revokeObjectURL(url);
}

function sendQ() {
  const p=curProd, d=p.getDims(p.state), pr=p.price(p.state);
  const nm=document.getElementById('q-name').value||'—';
  const em=document.getElementById('q-email').value||'—';
  const nt=document.getElementById('q-notes').value;
  const edNo=editionNum(p.state);
  const finishLabel = finishState==='edgeband' ? 'Oiled + Edge Band' : 'Oiled';
  const totalRetail = pr.retail + (finishState==='edgeband' ? EB_UPCHARGE : 0);
  const cuts2=p.getCuts?p.getCuts(p.state):null;
  const partsSum=cuts2?cuts2.parts.map(pt=>`  ${pt.name} x${pt.qty}  (${pt.L}" x ${pt.W}" x 0.75")`).join('\n'):'see configurator';
  const subj=`New Order — ${p.name} — $${totalRetail} — ${nm}`;
  const body=`ORDER\n=====\nProduct: ${p.name}\nModel: ${p.modelPrefix} · No. ${edNo} / 100\nDimensions: ${d.dimStr}\nFinish: ${finishLabel}\nPrice: $${totalRetail} incl. shipping\n\nCUSTOMER\n========\nName: ${nm}\nEmail: ${em}\n${nt?'Notes: '+nt+'\n':''}\nPARTS\n=====\n${partsSum}\n\nNEXT: Download Production Packet from configurator to send to CNC shop.\nPlaced via benstudios.com configurator`;
  window.open(`mailto:${SELLER}?subject=${encodeURIComponent(subj)}&body=${encodeURIComponent(body)}`);
  closeQ();
}

// ═══════════════════════════════════════════════════════════════
//  Resize + render loop
// ═══════════════════════════════════════════════════════════════
function onR() {
  const m=document.getElementById('viewer');
  ren.setSize(m.clientWidth, m.clientHeight);
  cam.aspect=m.clientWidth/m.clientHeight;
  cam.updateProjectionMatrix();
}
window.addEventListener('resize', onR); onR();
(function anim() { requestAnimationFrame(anim); ren.render(scene, cam); })();

// ── Init ─────────────────────────────────────────────────────
const _qs = new URLSearchParams(window.location.search);
const urlProd = _qs.get('p');
const urlTy   = _qs.get('ty');
if (urlProd && PRODS.find(p => p.id === urlProd)) {
  curProd = PRODS.find(p => p.id === urlProd);
  if (urlTy !== null && !isNaN(urlTy)) {
    const ti = parseInt(urlTy);
    if (ti >= 0 && ti < curProd.types.length) {
      curProd.state.ty = ti;
      curProd.onTypeChange();
      noTypeSelected = false; // type pre-selected from landing page — go straight to configurator
    }
  }
}
syncNav();
rebuild();
</script>
</body>
</html>

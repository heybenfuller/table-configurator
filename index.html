<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ben Studios — Baltic Birch Furniture, Made to Order</title>
  <style>
    :root { --hd: 52px; }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; }
    body {
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      background: #F9F0C7;
      color: #111;
      -webkit-font-smoothing: antialiased;
      cursor: default;
    }

    /* ── Header ── */
    .hd {
      position: fixed; top: 0; left: 0; right: 0; height: var(--hd);
      z-index: 10;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 clamp(24px, 4vw, 60px);
    }
    .logo {
      font-size: 11px; font-weight: 700; letter-spacing: 0.18em;
      text-transform: uppercase; color: #111;
      text-decoration: none;
    }
    .hd-link {
      font-size: 10px; font-weight: 500; letter-spacing: 0.12em;
      text-transform: uppercase; color: #999;
      text-decoration: none; transition: color 0.2s;
    }
    .hd-link:hover { color: #111; }

    /* ── Canvas fills viewport ── */
    #cv {
      position: fixed; inset: 0;
      width: 100%; height: 100%;
      display: block;
    }

    /* ── Hero overlay ── */
    .hero {
      position: fixed;
      top: var(--hd); left: 0;
      width: 40%;
      height: calc(100% - var(--hd));
      display: flex; flex-direction: column; justify-content: flex-end;
      padding: 0 clamp(24px, 4vw, 60px) clamp(40px, 6vh, 80px);
      pointer-events: none;
      z-index: 5;
    }
    .hero-h {
      font-size: clamp(36px, 5.5vw, 82px);
      font-weight: 700;
      letter-spacing: -0.04em;
      line-height: 0.95;
      margin-bottom: 20px;
      color: #F9F0C7;
      -webkit-text-stroke: 1.5px #111;
      paint-order: stroke fill;
    }
    .hero-sub {
      font-size: clamp(12px, 1.1vw, 14px);
      color: #888;
      line-height: 1.7;
      max-width: 36ch;
      margin-bottom: 28px;
    }
    .hero-cta {
      pointer-events: all;
      display: inline-block;
      font-size: 10px; font-weight: 600; letter-spacing: 0.14em;
      text-transform: uppercase; color: #111;
      text-decoration: none;
      border-bottom: 1px solid #999;
      padding-bottom: 3px;
      transition: border-color 0.2s, color 0.2s;
      width: fit-content;
    }
    .hero-cta:hover { border-color: #111; }

    /* ── Product name tooltip ── */
    #tooltip {
      position: fixed;
      bottom: clamp(28px, 4vh, 48px);
      right: clamp(24px, 4vw, 60px);
      text-align: right;
      z-index: 10;
      pointer-events: none;
      transition: opacity 0.2s;
      opacity: 0;
    }
    #tooltip-name {
      font-size: 13px; font-weight: 600; letter-spacing: 0.01em; color: #111;
      margin-bottom: 3px;
    }
    #tooltip-hint {
      font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase;
      color: #AAA;
    }

    /* ── Cursor crosshair on hoverable product ── */
    body.over-product { cursor: pointer; }
  </style>
</head>
<body>

<header class="hd">
  <a class="logo" href="index.html">Ben Studios</a>
  <a class="hd-link" href="table-configurator.html">All products →</a>
</header>

<canvas id="cv"></canvas>

<div class="hero">
  <h1 class="hero-h">Baltic birch furniture,<br>made to order.</h1>
  <p class="hero-sub">¾″ void-free plywood, CNC-cut, dado-jointed, hand-oiled. Designed in Brooklyn. Configure your dimensions and order direct.</p>
  <a class="hero-cta" href="table-configurator.html">Configure yours</a>
</div>

<div id="tooltip">
  <div id="tooltip-name"></div>
  <div id="tooltip-hint">Click to configure</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ═══════════════════════════════════════════════════════════
//  Renderer & scene
// ═══════════════════════════════════════════════════════════
const cv = document.getElementById('cv');
const ren = new THREE.WebGLRenderer({ canvas:cv, antialias:true });
ren.setPixelRatio(Math.min(window.devicePixelRatio, 2));
ren.shadowMap.enabled = true;
ren.shadowMap.type = THREE.PCFSoftShadowMap;
ren.outputEncoding = THREE.sRGBEncoding;
ren.physicallyCorrectLights = true;
ren.toneMapping = THREE.ACESFilmicToneMapping;
ren.toneMappingExposure = 1.1;

const scene = new THREE.Scene();
scene.background = new THREE.Color(0xF9F0C7);

const cam = new THREE.PerspectiveCamera(44, 1, 0.1, 1000);
cam.position.set(0, 55, 290);
cam.lookAt(0, 18, 0);

// ── Lighting — studio window, upper left ──
scene.add(new THREE.HemisphereLight(0xFFF8E8, 0xD8CC99, 1.2));

const key = new THREE.DirectionalLight(0xFFFBF0, 3.2);
key.position.set(-100, 200, 80);
key.castShadow = true;
key.shadow.mapSize.set(2048, 2048);
Object.assign(key.shadow.camera, { left:-300, right:300, top:200, bottom:-100, near:1, far:600 });
key.shadow.bias = -0.0004;
key.shadow.radius = 3;
scene.add(key);

const fill = new THREE.DirectionalLight(0xFFEFCC, 0.8);
fill.position.set(120, 60, -60);
scene.add(fill);

// Subtle floor (receives shadows only, very dark)
const floor = new THREE.Mesh(
  new THREE.PlaneGeometry(2000, 2000),
  new THREE.MeshStandardMaterial({ color:0xF2E8B8, roughness:1, metalness:0 })
);
floor.rotation.x = -Math.PI/2;
floor.receiveShadow = true;
scene.add(floor);

// ═══════════════════════════════════════════════════════════
//  Baltic birch textures
// ═══════════════════════════════════════════════════════════
const FACE = [200,172,128], EDGE = [155,126,88];
const T = 0.75;

function mkFTex(r,g,b) {
  const SZ=512, c=document.createElement('canvas'); c.width=SZ; c.height=SZ;
  const x=c.getContext('2d');
  x.fillStyle=`rgb(${r},${g},${b})`; x.fillRect(0,0,SZ,SZ);
  for(let y=0;y<SZ;y++){
    const w=Math.sin(y*0.018)*6+Math.sin(y*0.042+1.3)*3;
    const band=Math.sin(y*0.11+w*0.08)*0.5+0.5;
    x.fillStyle=`rgba(${r-30},${g-28},${r-55},${0.007+band*0.016})`; x.fillRect(0,y,SZ,1);
  }
  const t=new THREE.CanvasTexture(c); t.encoding=THREE.sRGBEncoding; t.wrapS=t.wrapT=THREE.RepeatWrapping; return t;
}
function mkETex(r,g,b) {
  const c=document.createElement('canvas'); c.width=16; c.height=128;
  const x=c.getContext('2d'); const pl=13, ph=c.height/pl;
  for(let i=0;i<pl;i++){
    const y=i*ph;
    x.fillStyle=i%2===0?`rgb(${r+15},${g+15},${b+10})`:`rgb(${r-10},${g-10},${b-8})`;
    x.fillRect(0,y,c.width,ph);
    x.fillStyle=`rgba(${r-40},${g-40},${b-20},0.55)`; x.fillRect(0,y,c.width,0.8);
  }
  const t=new THREE.CanvasTexture(c); t.encoding=THREE.sRGBEncoding; t.wrapS=t.wrapT=THREE.RepeatWrapping; t.magFilter=THREE.NearestFilter; return t;
}
function mkETexV(r,g,b) {
  const c=document.createElement('canvas'); c.width=128; c.height=16;
  const x=c.getContext('2d'); const pl=13, pw=c.width/pl;
  for(let i=0;i<pl;i++){
    const xp=i*pw;
    x.fillStyle=i%2===0?`rgb(${r+15},${g+15},${b+10})`:`rgb(${r-10},${g-10},${b-8})`;
    x.fillRect(xp,0,pw,c.height);
    x.fillStyle=`rgba(${r-40},${g-40},${b-20},0.55)`; x.fillRect(xp,0,0.8,c.height);
  }
  const t=new THREE.CanvasTexture(c); t.encoding=THREE.sRGBEncoding; t.wrapS=t.wrapT=THREE.RepeatWrapping; t.magFilter=THREE.NearestFilter; return t;
}

let mF, mFT, mE, mEV;
function buildMats() {
  mF  = new THREE.MeshStandardMaterial({ map:mkFTex(...FACE), roughness:0.55, metalness:0 });
  mFT = new THREE.MeshStandardMaterial({ map:mkFTex(FACE[0]+8,FACE[1]+8,FACE[2]+5), roughness:0.55, metalness:0 });
  mE  = new THREE.MeshStandardMaterial({ map:mkETex(...EDGE), roughness:0.65, metalness:0 });
  mEV = new THREE.MeshStandardMaterial({ map:mkETexV(...EDGE), roughness:0.65, metalness:0 });
}
function mFlat() { return [mE.clone(),mE.clone(),mFT.clone(),mF.clone(),mE.clone(),mE.clone()]; }
function mStand(){ return [mF.clone(),mF.clone(),mE.clone(),mE.clone(),mEV.clone(),mEV.clone()]; }

function box(w,h,d, mat, px,py,pz, parent) {
  const g=new THREE.BoxGeometry(w,h,d);
  const m=new THREE.Mesh(g, mat);
  m.position.set(px,py,pz); m.castShadow=true; m.receiveShadow=true;
  parent.add(m);
  m.add(new THREE.LineSegments(new THREE.EdgesGeometry(g), new THREE.LineBasicMaterial({color:0x402808,transparent:true,opacity:0.12})));
  return m;
}

// ═══════════════════════════════════════════════════════════
//  Product definitions
// ═══════════════════════════════════════════════════════════
const ITEMS = [
  { id:'tables',  ty:0, name:'Dining Table' },
  { id:'tables',  ty:1, name:'Coffee Table' },
  { id:'tables',  ty:2, name:'Coffee + Shelf' },
  { id:'tables',  ty:3, name:'Side Table' },
  { id:'shelving',ty:0, name:'Bookcase' },
  { id:'shelving',ty:1, name:'Wall Shelf' },
  { id:'seating', ty:0, name:'Bench' },
  { id:'seating', ty:1, name:'Stool' },
  { id:'seating', ty:2, name:'Daybed' },
];

function buildProduct(id, ty) {
  buildMats();
  const g = new THREE.Group();

  if(id==='tables' && ty===0) { // Dining — two upright flanges + web spine
    const L=72,W=36,H=30;
    const recess=12,inset=4,panelH=H-T,baseW=W-2*inset;
    const webLen=L-2*recess-2*T;
    const xL=-L/2+recess+T/2, xR=L/2-recess-T/2;
    box(L,T,W,mFlat(),0,H-T/2,0,g);                        // top
    box(T,panelH,baseW,mStand(),xL,panelH/2,0,g);          // left flange
    box(T,panelH,baseW,mStand(),xR,panelH/2,0,g);          // right flange
    // web spine — face grain on front/back (Z faces = indices 4,5)
    const wg=new THREE.BoxGeometry(webLen,panelH,T);
    const wm=new THREE.Mesh(wg,[mEV.clone(),mEV.clone(),mE.clone(),mE.clone(),mF.clone(),mF.clone()]);
    wm.position.set(0,panelH/2,0); wm.castShadow=true; g.add(wm);
    wm.add(new THREE.LineSegments(new THREE.EdgesGeometry(wg),new THREE.LineBasicMaterial({color:0x402808,transparent:true,opacity:0.12})));
  } else if(id==='tables' && ty===1) { // Coffee — trestle
    const L=48,W=24,H=16;
    const recess=8,inset=3,panelH=H-T,baseW=W-2*inset;
    const webLen=L-2*recess-2*T;
    const xL=-L/2+recess+T/2, xR=L/2-recess-T/2;
    box(L,T,W,mFlat(),0,H-T/2,0,g);
    box(T,panelH,baseW,mStand(),xL,panelH/2,0,g);
    box(T,panelH,baseW,mStand(),xR,panelH/2,0,g);
    const wg=new THREE.BoxGeometry(webLen,panelH,T);
    const wm=new THREE.Mesh(wg,[mEV.clone(),mEV.clone(),mE.clone(),mE.clone(),mF.clone(),mF.clone()]);
    wm.position.set(0,panelH/2,0); wm.castShadow=true; g.add(wm);
    wm.add(new THREE.LineSegments(new THREE.EdgesGeometry(wg),new THREE.LineBasicMaterial({color:0x402808,transparent:true,opacity:0.12})));
  } else if(id==='tables' && ty===2) { // Coffee+shelf
    const L=48,W=24,H=16,epH=H-T,iL=L-2*T;
    box(L,T,W+1,mFlat(),0,H-T/2,0.5,g);
    [-1,1].forEach(s=>box(T,epH,W,mStand(),s*(L/2-T/2),epH/2,0,g));
    box(iL,T,W,mFlat(),0,4,0,g);
  } else if(id==='tables' && ty===3) { // Side table
    const L=18,W=18,H=24,iW=L-2*T,iH=H-2*T;
    box(L,T,W+1,mFlat(),0,H-T/2,0.5,g);
    box(L,T,W,mFlat(),0,T/2,0,g);
    [-1,1].forEach(s=>box(T,iH,W,mStand(),s*(L/2-T/2),T+iH/2,0,g));
    box(iW,T,W,mFlat(),0,Math.round(H*0.45),0,g);
  } else if(id==='shelving' && ty===0) { // Bookcase
    const W=36,H=72,D=12,iW=W-2*T,iH=H-2*T;
    box(W+2,T,D+1,mFlat(),0,H+T/2,0.5,g);
    [-1,1].forEach(s=>box(T,H,D,mStand(),s*(W/2-T/2),H/2,0,g));
    box(iW,T,D,mFlat(),0,H-T/2,0,g);
    box(iW,T,D,mFlat(),0,T/2,0,g);
    [1,2,3,4].forEach(i=>box(iW,T,D,mFlat(),0,T+iH*(i/5),0,g));
  } else if(id==='shelving' && ty===1) { // Wall shelf
    const W=36,D=12,H=6;
    box(W,T,D+1,mFlat(),0,H-T/2,0.5,g);
    box(W,H-T,T,[mF.clone(),mF.clone(),mE.clone(),mE.clone(),mF.clone(),mF.clone()],0,(H-T)/2,-(D/2-T/2),g);
    [-1,1].forEach(s=>box(T,H-T,D-1,mStand(),s*(W/2-5),(H-T)/2,0,g));
    g.position.y = 36; // mount at 36" to look natural
  } else if(id==='seating' && ty===0) { // Bench
    const W=48,H=18,D=12,iH=H-T,iW=W-2*T;
    box(W,T,D+1,mFlat(),0,H-T/2,0.5,g);
    [-1,1].forEach(s=>box(T,iH,D,mStand(),s*(W/2-T/2),iH/2,0,g));
    box(iW,T,D,mFlat(),0,7,0,g);
    box(T,iH,D,mStand(),0,iH/2,0,g);
  } else if(id==='seating' && ty===1) { // Stool
    const W=15,D=13,H=24,iH=H-T,iW=W-2*T;
    box(W,T,D+1,mFlat(),0,H-T/2,0.5,g);
    [-1,1].forEach(s=>box(T,iH,D,mStand(),s*(W/2-T/2),iH/2,0,g));
    const bpg=new THREE.BoxGeometry(iW,iH,T);
    const bpm=new THREE.Mesh(bpg,[mE.clone(),mE.clone(),mE.clone(),mE.clone(),mF.clone(),mF.clone()]);
    bpm.position.set(0,iH/2,-(D/2-T/2)); bpm.castShadow=true; g.add(bpm);
    bpm.add(new THREE.LineSegments(new THREE.EdgesGeometry(bpg),new THREE.LineBasicMaterial({color:0x402808,transparent:true,opacity:0.12})));
    box(iW,T,D,mFlat(),0,6,0,g);
  } else if(id==='seating' && ty===2) { // Daybed
    const L=75,W=38,H=14,iW=L-2*T,supH=H-T-5-T;
    box(L,T,W+1,mFlat(),0,H-T/2,0.5,g);
    [-1,1].forEach(s=>box(T,H,W,mStand(),s*(L/2-T/2),H/2,0,g));
    box(iW,T,W,mFlat(),0,5,0,g);
    box(T,supH,W,mStand(),0,5+T+supH/2,0,g);
  }

  return g;
}

// ═══════════════════════════════════════════════════════════
//  Carousel
// ═══════════════════════════════════════════════════════════
const SLOT = 82;    // spacing between products — clear of widest pieces (daybed 75u, dining 72u)
const N = ITEMS.length;
const TOTAL = N * SLOT;

const track = new THREE.Group();
scene.add(track);

// Build 2 complete sets for gapless looping.
// Items positioned at j*SLOT (j = 0..2N-1).
// track.position.x = -scrollX + SLOT/2  →  world x of item j = j*SLOT - scrollX + SLOT/2
// At scrollX = TOTAL/2, set-0 item 4 lands at x=0 (screen centre).
// Forward-wrap: scrollX % TOTAL; at the boundary set-1 positions = set-0 positions → seamless.
const slots = ITEMS.map((item, i) => ({
  item, groups: [], hits: [], scale: 1, targetScale: 1
}));

const allHitMeshes = [];

for (let set = 0; set < 2; set++) {
  ITEMS.forEach((item, i) => {
    const j   = set * N + i;
    const xPos = j * SLOT;

    const prod = buildProduct(item.id, item.ty);
    prod.position.x = xPos;

    const hg = new THREE.BoxGeometry(SLOT - 4, 90, 20);
    const hm = new THREE.MeshBasicMaterial({ visible: false, side: THREE.FrontSide });
    const hit = new THREE.Mesh(hg, hm);
    hit.position.set(xPos, 45, 0);
    hit.userData = { slotIdx: i };   // 0-8, shared between both sets

    track.add(prod);
    track.add(hit);

    slots[i].groups.push(prod);
    slots[i].hits.push(hit);
    allHitMeshes.push(hit);
  });
}

// ── Scroll state — start at TOTAL/2 so set-0 centre is on screen with content on both sides
let scrollX = TOTAL / 2;
const SCROLL_SPEED = 0.10; // units per frame — faster base speed

// ── Drag state
let isDragging = false;
let dragStartClientX = 0;
let dragStartScrollX = 0;
let dragDelta = 0; // track how far we dragged to suppress click

// World units visible per screen pixel (updated on resize)
let worldPerPx = 1;
function updateWorldPerPx() {
  const halfFov = (44 / 2) * Math.PI / 180;
  const visibleWidth = 2 * 290 * Math.tan(halfFov);
  worldPerPx = visibleWidth / window.innerWidth;
}
updateWorldPerPx();

// ── Raycasting
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();
let hoveredIdx = -1;
const hitMeshes = allHitMeshes;

function getHoveredIdx(clientX, clientY) {
  const rect = cv.getBoundingClientRect();
  mouse.x = ((clientX - rect.left) / rect.width) * 2 - 1;
  mouse.y = -((clientY - rect.top) / rect.height) * 2 + 1;
  raycaster.setFromCamera(mouse, cam);
  const hits = raycaster.intersectObjects(hitMeshes);
  return hits.length > 0 ? hits[0].object.userData.slotIdx : -1;
}

function setHovered(idx) {
  if(idx === hoveredIdx) return;
  if(hoveredIdx !== -1) slots[hoveredIdx].targetScale = 1;
  hoveredIdx = idx;
  const tt = document.getElementById('tooltip');
  const tn = document.getElementById('tooltip-name');
  if(idx !== -1) {
    slots[idx].targetScale = 1.10;
    tn.textContent = ITEMS[idx].name;
    tt.style.opacity = '1';
    document.body.classList.add('over-product');
  } else {
    tt.style.opacity = '0';
    document.body.classList.remove('over-product');
  }
}

cv.addEventListener('mousedown', e => {
  isDragging = true;
  dragStartClientX = e.clientX;
  dragStartScrollX = scrollX;
  dragDelta = 0;
  document.body.style.cursor = 'grabbing';
});

window.addEventListener('mouseup', e => {
  if(!isDragging) return;
  isDragging = false;
  document.body.style.cursor = '';
  // Only navigate if it was a click (not a drag)
  if(Math.abs(dragDelta) < 4 && hoveredIdx !== -1) {
    const item = ITEMS[hoveredIdx];
    window.location.href = `table-configurator.html?p=${item.id}&ty=${item.ty}`;
  }
});

window.addEventListener('mousemove', e => {
  if(isDragging) {
    dragDelta = e.clientX - dragStartClientX;
    scrollX = dragStartScrollX - dragDelta * worldPerPx;
  } else {
    setHovered(getHoveredIdx(e.clientX, e.clientY));
  }
});

// ── Resize
function resize() {
  const w = window.innerWidth, h = window.innerHeight;
  ren.setSize(w, h, false);
  cam.aspect = w/h;
  cam.updateProjectionMatrix();
  updateWorldPerPx();
}
window.addEventListener('resize', resize);
resize();

// ═══════════════════════════════════════════════════════════
//  Animation loop
// ═══════════════════════════════════════════════════════════
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);

  // Auto-scroll — stop when hovering or dragging
  if(!isDragging && hoveredIdx === -1) scrollX += SCROLL_SPEED;

  // Seamless wrap — at the boundary, set-1 world positions === set-0 world positions
  scrollX = ((scrollX % TOTAL) + TOTAL) % TOTAL;

  // world x of item j  =  j*SLOT  +  track.position.x  =  j*SLOT - scrollX + SLOT/2
  track.position.x = -scrollX + SLOT / 2;

  // Smooth scale — apply to both set copies so hover on either looks identical
  slots.forEach(s => {
    s.scale += (s.targetScale - s.scale) * 0.1;
    s.groups.forEach(g => g.scale.setScalar(s.scale));
  });

  ren.render(scene, cam);
}
animate();
</script>
</body>
</html>

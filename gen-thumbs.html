<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Ben Studios — Generate Product Thumbnails</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <style>
    body { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; background: #1a1a1a; color: #fff; padding: 40px; }
    h1 { font-size: 13px; font-weight: 700; letter-spacing: 0.18em; text-transform: uppercase; margin-bottom: 8px; }
    p { font-size: 12px; color: #888; margin-bottom: 32px; line-height: 1.6; }
    #status { font-size: 11px; color: #C49A14; letter-spacing: 0.06em; margin-bottom: 24px; min-height: 20px; }
    .grid { display: grid; grid-template-columns: repeat(4, 200px); gap: 12px; }
    .thumb { position: relative; }
    .thumb img { width: 200px; height: 200px; object-fit: cover; display: block; }
    .thumb-label { font-size: 9px; letter-spacing: 0.08em; text-transform: uppercase; color: #666; margin-top: 5px; }
    .thumb-ok { color: #3a3; font-size: 9px; }
    #canvas { display: none; }
    button { margin-top: 24px; padding: 12px 28px; background: #D4001A; color: #fff; border: none; font-family: inherit; font-size: 10px; font-weight: 700; letter-spacing: 0.15em; text-transform: uppercase; cursor: pointer; }
    button:hover { background: #B00016; }
  </style>
</head>
<body>
  <h1>Ben Studios — Thumbnail Generator</h1>
  <p>Opens this page once to render and save all product thumbnails.<br>
     Files will download as <code>thumb-[product].jpg</code> — place them in a <code>thumbs/</code> folder alongside index.html.</p>
  <div id="status">Initialising…</div>
  <div class="grid" id="grid"></div>
  <canvas id="canvas" width="900" height="900"></canvas>
  <button onclick="downloadAll()">↓ Download All Thumbnails</button>

<script>
const T = 0.75;
const FACE = [200,172,128], EDGE = [155,126,88];

// ── Three.js setup ─────────────────────────────────────────────
const canvas = document.getElementById('canvas');
const ren = new THREE.WebGLRenderer({ canvas, antialias: true, preserveDrawingBuffer: true });
ren.setPixelRatio(1);
ren.shadowMap.enabled = true;
ren.shadowMap.type = THREE.PCFSoftShadowMap;
ren.outputEncoding = THREE.sRGBEncoding;
ren.physicallyCorrectLights = true;
ren.toneMapping = THREE.ACESFilmicToneMapping;
ren.toneMappingExposure = 1.35;
ren.setSize(900, 900);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0xF5F1EB);
const cam = new THREE.PerspectiveCamera(30, 1, 0.1, 10000);

scene.add(new THREE.HemisphereLight(0xFFF8EE, 0xE0D8C8, 0.9));
const sun = new THREE.DirectionalLight(0xFFFBF0, 3.2);
sun.position.set(80, 200, 120); sun.castShadow = true;
sun.shadow.mapSize.set(2048, 2048);
Object.assign(sun.shadow.camera, { left:-200, right:200, top:200, bottom:-200, near:1, far:600 });
sun.shadow.bias = -0.0005; scene.add(sun);
const fill = new THREE.DirectionalLight(0xE8EEFF, 1.0);
fill.position.set(-80, 60, -60); scene.add(fill);
const gnd = new THREE.Mesh(
  new THREE.PlaneGeometry(3000, 3000),
  new THREE.MeshStandardMaterial({ color: 0xF5F1EB, roughness: 1, metalness: 0 })
);
gnd.rotation.x = -Math.PI / 2; gnd.receiveShadow = true; scene.add(gnd);

// ── Textures ───────────────────────────────────────────────────
function mkFTex(r,g,b) {
  const SZ=1024, c=document.createElement('canvas'); c.width=SZ; c.height=SZ;
  const x=c.getContext('2d');
  x.fillStyle=`rgb(${r},${g},${b})`; x.fillRect(0,0,SZ,SZ);
  for(let y=0;y<SZ;y++){
    const wave=Math.sin(y*0.018)*6+Math.sin(y*0.042+1.3)*3+Math.sin(y*0.091+2.7)*1.2;
    const band=Math.sin(y*0.11+wave*0.08)*0.5+0.5;
    x.fillStyle=`rgba(${r-30},${g-28},${r-55},${0.008+band*0.018})`; x.fillRect(0,y,SZ,1);
  }
  for(let i=0;i<4;i++){
    const by=Math.random()*SZ, bh=60+Math.random()*140, sh=Math.random()>0.5?8:-6;
    const gd=x.createLinearGradient(0,by,0,by+bh);
    gd.addColorStop(0,`rgba(${r+sh},${g+sh},${b+sh*.5},0)`);
    gd.addColorStop(.5,`rgba(${r+sh},${g+sh},${b+sh*.5},.04)`);
    gd.addColorStop(1,`rgba(${r+sh},${g+sh},${b+sh*.5},0)`);
    x.fillStyle=gd; x.fillRect(0,by,SZ,bh);
  }
  const t=new THREE.CanvasTexture(c); t.encoding=THREE.sRGBEncoding; t.wrapS=t.wrapT=THREE.RepeatWrapping; return t;
}
function mkETex(r,g,b) {
  const c=document.createElement('canvas'); c.width=16; c.height=128;
  const x=c.getContext('2d'); const pl=13, ph=c.height/pl;
  for(let i=0;i<pl;i++){const y=i*ph; x.fillStyle=i%2===0?`rgb(${r+15},${g+15},${b+10})`:`rgb(${r-10},${g-10},${b-8})`; x.fillRect(0,y,c.width,ph); x.fillStyle=`rgba(${r-40},${g-40},${b-20},.55)`; x.fillRect(0,y,c.width,.8);}
  const t=new THREE.CanvasTexture(c); t.encoding=THREE.sRGBEncoding; t.wrapS=t.wrapT=THREE.RepeatWrapping; t.magFilter=THREE.NearestFilter; return t;
}
function mkETexV(r,g,b) {
  const c=document.createElement('canvas'); c.width=128; c.height=16;
  const x=c.getContext('2d'); const pl=13, pw=c.width/pl;
  for(let i=0;i<pl;i++){const xp=i*pw; x.fillStyle=i%2===0?`rgb(${r+15},${g+15},${b+10})`:`rgb(${r-10},${g-10},${b-8})`; x.fillRect(xp,0,pw,c.height); x.fillStyle=`rgba(${r-40},${g-40},${b-20},.55)`; x.fillRect(xp,0,.8,c.height);}
  const t=new THREE.CanvasTexture(c); t.encoding=THREE.sRGBEncoding; t.wrapS=t.wrapT=THREE.RepeatWrapping; t.magFilter=THREE.NearestFilter; return t;
}

let mF, mFT, mE, mEV;
function buildMats() {
  mF  = new THREE.MeshStandardMaterial({ map:mkFTex(...FACE), roughness:0.52, metalness:0 });
  mFT = new THREE.MeshStandardMaterial({ map:mkFTex(FACE[0]+8,FACE[1]+8,FACE[2]+5), roughness:0.52, metalness:0 });
  mE  = new THREE.MeshStandardMaterial({ map:mkETex(...EDGE), roughness:0.62, metalness:0 });
  mEV = new THREE.MeshStandardMaterial({ map:mkETexV(...EDGE), roughness:0.62, metalness:0 });
}
const mMetal = new THREE.MeshStandardMaterial({ color:0x686868, roughness:0.28, metalness:0.92 });

function mFlat()  { return [mE.clone(),mE.clone(),mFT.clone(),mF.clone(),mE.clone(),mE.clone()]; }
function mStand() { return [mF.clone(),mF.clone(),mE.clone(),mE.clone(),mEV.clone(),mEV.clone()]; }
function mWeb()   { return [mEV.clone(),mEV.clone(),mE.clone(),mE.clone(),mF.clone(),mF.clone()]; }
function eL(m,g)  { m.add(new THREE.LineSegments(new THREE.EdgesGeometry(g), new THREE.LineBasicMaterial({color:0x604010,transparent:true,opacity:0.16}))); }

const grp = new THREE.Group(); scene.add(grp);
function clearGrp() {
  while(grp.children.length) { const o=grp.children[0]; if(o.geometry)o.geometry.dispose(); if(o.children)o.children.forEach(c=>{if(c.geometry)c.geometry.dispose();}); grp.remove(o); }
}

// ── Product builders ───────────────────────────────────────────
const PRODUCTS = [
  {
    id: 'table', label: 'Dining Table',
    // standard 6-person, dining height, standard width
    build() {
      const L=72, W=30, H=30, recess=10, inset=4, panelH=H-T, baseW=W-2*inset, webLen=+(L-2*recess-2*T).toFixed(2);
      const tg=new THREE.BoxGeometry(L,T,W); const tm=new THREE.Mesh(tg,mFlat()); tm.position.set(0,H-T/2,0); tm.castShadow=true; grp.add(tm); eL(tm,tg);
      [(-L/2+recess+T/2),(L/2-recess-T/2)].forEach(xp=>{const fg=new THREE.BoxGeometry(T,panelH,baseW);const fm=new THREE.Mesh(fg,mStand());fm.position.set(xp,panelH/2,0);fm.castShadow=true;grp.add(fm);eL(fm,fg);});
      const wg=new THREE.BoxGeometry(webLen,panelH,T); const wm=new THREE.Mesh(wg,mWeb()); wm.position.set(0,panelH/2,0); wm.castShadow=true; grp.add(wm); eL(wm,wg);
      return { cx:0, cy:H*0.38, cz:0, sc:Math.max(L,W,H)*2.1 };
    }
  },
  {
    id: 'coffee-slab', label: 'Slab Coffee Table',
    build() {
      const L=48, W=24, H=16, recess=8, inset=3, panelH=H-T, baseW=W-2*inset, webLen=+(L-2*recess-2*T).toFixed(2);
      const tg=new THREE.BoxGeometry(L,T,W); const tm=new THREE.Mesh(tg,mFlat()); tm.position.set(0,H-T/2,0); tm.castShadow=true; grp.add(tm); eL(tm,tg);
      [(-L/2+recess+T/2),(L/2-recess-T/2)].forEach(xp=>{const fg=new THREE.BoxGeometry(T,panelH,baseW);const fm=new THREE.Mesh(fg,mStand());fm.position.set(xp,panelH/2,0);fm.castShadow=true;grp.add(fm);eL(fm,fg);});
      const wg=new THREE.BoxGeometry(webLen,panelH,T); const wm=new THREE.Mesh(wg,mWeb()); wm.position.set(0,panelH/2,0); grp.add(wm); eL(wm,wg);
      return { cx:0, cy:H*0.42, cz:0, sc:Math.max(L,W)*2.2 };
    }
  },
  {
    id: 'coffee-box', label: 'Box Coffee Table',
    build() {
      const L=48, W=24, H=16, innerL=L-2*T, innerH=H-2*T, shelfY=4;
      const mk=(g,y,cast=false)=>{const m=new THREE.Mesh(g,mFlat());m.position.set(0,y,0);if(cast)m.castShadow=true;grp.add(m);eL(m,g);};
      const tg=new THREE.BoxGeometry(L,T,W); mk(tg,H-T/2,true);
      const bg=new THREE.BoxGeometry(L,T,W); mk(bg,T/2);
      [-1,1].forEach(s=>{const eg=new THREE.BoxGeometry(T,innerH,W);const em=new THREE.Mesh(eg,mStand());em.position.set(s*(L/2-T/2),T+innerH/2,0);em.castShadow=true;grp.add(em);eL(em,eg);});
      const sg=new THREE.BoxGeometry(innerL,T,W); mk(sg,shelfY,true);
      return { cx:0, cy:H*0.45, cz:0, sc:Math.max(L,W)*2.2 };
    }
  },
  {
    id: 'sidetable', label: 'Side Table',
    build() {
      const L=18, W=18, H=24, innerH=H-2*T, shelfY=Math.round(H*0.45), iW=L-2*T;
      const mk=(g,y,cast=false)=>{const m=new THREE.Mesh(g,mFlat());m.position.set(0,y,0);if(cast)m.castShadow=true;grp.add(m);eL(m,g);};
      mk(new THREE.BoxGeometry(L,T,W), H-T/2, true);
      mk(new THREE.BoxGeometry(L,T,W), T/2);
      [-1,1].forEach(s=>{const sg=new THREE.BoxGeometry(T,innerH,W);const sm=new THREE.Mesh(sg,mStand());sm.position.set(s*(L/2-T/2),T+innerH/2,0);sm.castShadow=true;grp.add(sm);eL(sm,sg);});
      mk(new THREE.BoxGeometry(iW,T,W), shelfY);
      return { cx:0, cy:H*0.42, cz:0, sc:Math.max(L,W,H)*2.7 };
    }
  },
  {
    id: 'shelving', label: 'Shelving System',
    build() {
      const W=36, H=70, D=12, nShelves=5, gap=(H-T)/(nShelves-1), shW=W-2*T;
      [-1,1].forEach(s=>{const ug=new THREE.BoxGeometry(T,H,D);const um=new THREE.Mesh(ug,mStand());um.position.set(s*(W/2-T/2),H/2,0);um.castShadow=true;grp.add(um);eL(um,ug);});
      for(let i=0;i<nShelves;i++){const y=i*gap+T/2;const sg=new THREE.BoxGeometry(shW,T,D);const sm=new THREE.Mesh(sg,mFlat());sm.position.set(0,y,0);sm.castShadow=true;grp.add(sm);eL(sm,sg);if(i>0&&i<nShelves-1){[-1,1].forEach(s=>{const pg=new THREE.CylinderGeometry(.28,.28,1.4,8);const pm=new THREE.Mesh(pg,mMetal);pm.position.set(s*(W/2-T-1),y-T/2-.7,D/2-2);grp.add(pm);});}}
      return { cx:0, cy:H*0.45, cz:0, sc:Math.max(W,H)*1.75 };
    }
  },
  {
    id: 'shelf', label: 'Wall Box',
    build() {
      const L=36, D=10, H=10, innerL=L-2*T, innerH=H-2*T;
      const mk=(g,y,mats=null)=>{const m=new THREE.Mesh(g,mats||mFlat());m.position.set(0,y,0);grp.add(m);eL(m,g);};
      mk(new THREE.BoxGeometry(L,T,D), H/2-T/2);
      mk(new THREE.BoxGeometry(L,T,D), -H/2+T/2);
      [-1,1].forEach(s=>{const sg=new THREE.BoxGeometry(T,innerH,D);const sm=new THREE.Mesh(sg,mStand());sm.position.set(s*(L/2-T/2),0,0);grp.add(sm);eL(sm,sg);});
      mk(new THREE.BoxGeometry(innerL,T,D), 0);
      const wg=new THREE.PlaneGeometry(L+20,H+30);
      const wm=new THREE.Mesh(wg,new THREE.MeshStandardMaterial({color:0xECE8E2,roughness:1}));
      wm.position.set(0,0,-(D/2+.3)); grp.add(wm);
      return { cx:0, cy:0, cz:0, sc:Math.max(L,40)*2.3 };
    }
  },
  {
    id: 'bench', label: 'Shoe Bench',
    build() {
      const W=36, H=18, D=12, shelfY=7, innerW=W-2*T, divCt=2;
      const mk=(g,y,cast=false)=>{const m=new THREE.Mesh(g,mFlat());m.position.set(0,y,0);if(cast)m.castShadow=true;grp.add(m);eL(m,g);};
      mk(new THREE.BoxGeometry(W,T,D), H-T/2, true);
      [-1,1].forEach(s=>{const eg=new THREE.BoxGeometry(T,H,D);const em=new THREE.Mesh(eg,mStand());em.position.set(s*(W/2-T/2),H/2,0);em.castShadow=true;grp.add(em);eL(em,eg);});
      mk(new THREE.BoxGeometry(innerW,T,D), shelfY, true);
      const divH=H-T-shelfY-T, step=innerW/(divCt+1);
      for(let i=1;i<=divCt;i++){const x=-innerW/2+i*step;const dg=new THREE.BoxGeometry(T,divH,D);const dm=new THREE.Mesh(dg,mStand());dm.position.set(x,shelfY+T+divH/2,0);dm.castShadow=true;grp.add(dm);eL(dm,dg);}
      return { cx:0, cy:H*0.48, cz:0, sc:Math.max(W,H,D)*2.8 };
    }
  },
  {
    id: 'entryshelf', label: 'Entryway Shelf',
    build() {
      const W=24, D=6, lip=1.75, wallY=0;
      const wg=new THREE.PlaneGeometry(W+20,22);
      const wm=new THREE.Mesh(wg,new THREE.MeshStandardMaterial({color:0xECE8E2,roughness:1}));
      wm.position.set(0,wallY+3,-(D/2+0.3)); grp.add(wm);
      const sg=new THREE.BoxGeometry(W,T,D); const sm=new THREE.Mesh(sg,mFlat()); sm.position.set(0,wallY,0); sm.castShadow=true; grp.add(sm); eL(sm,sg);
      const lg=new THREE.BoxGeometry(W,lip,T);
      const lm=new THREE.Mesh(lg,[mE.clone(),mE.clone(),mE.clone(),mE.clone(),mF.clone(),mF.clone()]);
      lm.position.set(0,wallY+T/2+lip/2,-(D/2-T/2)); lm.castShadow=true; grp.add(lm); eL(lm,lg);
      [-1,1].forEach(s=>{const rg=new THREE.BoxGeometry(T,lip,D);const rm=new THREE.Mesh(rg,mStand());rm.position.set(s*(W/2-T/2),wallY+T/2+lip/2,0);grp.add(rm);eL(rm,rg);});
      return { cx:0, cy:wallY+2, cz:0, sc:Math.max(W,40)*1.9 };
    }
  },
  {
    id: 'bookends', label: 'Bookends',
    build() {
      const S=7, base=6, gap=S*1.4;
      [-1,1].forEach(s=>{
        const xOff=s*(gap/2+T/2);
        const vg=new THREE.BoxGeometry(T,S,base); const vm=new THREE.Mesh(vg,mStand()); vm.position.set(xOff,S/2,0); vm.castShadow=true; grp.add(vm); eL(vm,vg);
        const bg=new THREE.BoxGeometry(base,T,base); const bm=new THREE.Mesh(bg,mFlat()); bm.position.set(xOff,T/2,0); bm.castShadow=bm.receiveShadow=true; grp.add(bm); eL(bm,bg);
      });
      return { cx:0, cy:S*0.38, cz:0, sc:(gap+S*2)*1.7 };
    }
  },
  {
    id: 'keytray', label: 'Key Tray',
    build() {
      const L=12, W=6, wallH=1.5;
      const bg=new THREE.BoxGeometry(L,T,W); const bm=new THREE.Mesh(bg,mFlat()); bm.position.set(0,T/2,0); bm.receiveShadow=true; grp.add(bm); eL(bm,bg);
      [-1,1].forEach(s=>{
        const wg=new THREE.BoxGeometry(L,wallH,T);
        const wm=new THREE.Mesh(wg,[mE.clone(),mE.clone(),mE.clone(),mE.clone(),mF.clone(),mF.clone()]);
        wm.position.set(0,T+wallH/2,s*(W/2-T/2)); wm.castShadow=true; grp.add(wm); eL(wm,wg);
      });
      [-1,1].forEach(s=>{const wg=new THREE.BoxGeometry(T,wallH,W-2*T);const wm=new THREE.Mesh(wg,mStand());wm.position.set(s*(L/2-T/2),T+wallH/2,0);grp.add(wm);eL(wm,wg);});
      return { cx:0, cy:wallH*0.6, cz:0, sc:Math.max(L,W)*3.2 };
    }
  },
  {
    id: 'candleholder', label: 'Candle Holders',
    build() {
      const heights=[3,5,7.5], base=3, spacing=base*1.6, totalW=(heights.length-1)*spacing;
      heights.forEach((h,i)=>{
        const xPos=-totalW/2+i*spacing;
        const bg=new THREE.BoxGeometry(base,h,base);
        const bm=new THREE.Mesh(bg,[mE.clone(),mE.clone(),mFT.clone(),mF.clone(),mE.clone(),mE.clone()]);
        bm.position.set(xPos,h/2,0); bm.castShadow=bm.receiveShadow=true; grp.add(bm); eL(bm,bg);
        const cg=new THREE.CylinderGeometry(0.5,0.5,0.4,12);
        const cm=new THREE.Mesh(cg,new THREE.MeshStandardMaterial({color:0x2A1A0A,roughness:0.9}));
        cm.position.set(xPos,h+0.1,0); grp.add(cm);
      });
      const maxH=Math.max(...heights);
      return { cx:0, cy:maxH*0.45, cz:0, sc:Math.max(totalW+base*2,maxH)*2.5 };
    }
  },
  {
    id: 'coasters', label: 'Coasters',
    build() {
      const n=6, size=3.75, spread=1.3, totalW=(n-1)*spread;
      for(let i=0;i<n;i++){
        const xPos=-totalW/2+i*spread;
        const cg=new THREE.BoxGeometry(size,T,size);
        const cm=new THREE.Mesh(cg,mFlat()); cm.position.set(xPos,T/2+i*0.08,-i*0.25); cm.castShadow=cm.receiveShadow=true; grp.add(cm); eL(cm,cg);
      }
      const hx=totalW/2+size*0.85, hw=size+0.4, hh=T+n*0.08+1.0, hd=size+0.4;
      [-1,1].forEach(s=>{const hg=new THREE.BoxGeometry(T,hh,hd);const hm=new THREE.Mesh(hg,mStand());hm.position.set(hx+s*(hw/2-T/2),hh/2,0);grp.add(hm);eL(hm,hg);});
      const hbg=new THREE.BoxGeometry(hw,T,hd); const hbm=new THREE.Mesh(hbg,mFlat()); hbm.position.set(hx,T/2,0); grp.add(hbm); eL(hbm,hbg);
      return { cx:hx/2, cy:T*2, cz:0, sc:(totalW+size*4)*2.8 };
    }
  },
  {
    id: 'plans', label: 'Cutlist Plans',
    build() {
      const shW=48, shD=96, shH=T*4;
      const sg=new THREE.BoxGeometry(shW,shH,shD); const sm=new THREE.Mesh(sg,mFlat()); sm.position.set(0,shH/2,0); grp.add(sm); eL(sm,sg);
      const lineMat=new THREE.LineBasicMaterial({color:0xD4001A,transparent:true,opacity:0.7});
      [8,16,24,32,40].forEach(x=>{const pts=[new THREE.Vector3(x-shW/2,shH+0.1,-shD/2),new THREE.Vector3(x-shW/2,shH+0.1,shD/2)];grp.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts),lineMat.clone()));});
      [16,32,48,64,80].forEach(z=>{const pts=[new THREE.Vector3(-shW/2,shH+0.1,z-shD/2),new THREE.Vector3(shW/2,shH+0.1,z-shD/2)];grp.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts),lineMat.clone()));});
      return { cx:0, cy:shH*1.5, cz:0, sc:Math.max(shW,shD)*1.1 };
    }
  },
];

// Camera angle for all shots: th=0.55, ph=0.38 — slightly right-front, slightly above
const TH = 0.55, PH = 0.38;

function positionCamera(cx, cy, cz, sc) {
  const d = sc;
  cam.position.set(
    cx + d * Math.cos(PH) * Math.sin(TH),
    cy + d * Math.sin(PH),
    cz + d * Math.cos(PH) * Math.cos(TH)
  );
  cam.lookAt(new THREE.Vector3(cx, cy, cz));
  cam.updateProjectionMatrix();
}

// Storage for captured dataURLs
const captured = {};

// ── Render all and preview ─────────────────────────────────────
async function renderAll() {
  buildMats();
  document.getElementById('status').textContent = 'Rendering…';
  const grid = document.getElementById('grid');
  grid.innerHTML = '';

  for (const prod of PRODUCTS) {
    clearGrp();
    const dims = prod.build();
    positionCamera(dims.cx, dims.cy, dims.cz, dims.sc);
    ren.render(scene, cam);

    const dataURL = canvas.toDataURL('image/jpeg', 0.92);
    captured[prod.id] = { dataURL, label: prod.label };

    // Preview card
    const div = document.createElement('div');
    div.className = 'thumb';
    div.innerHTML = `<img src="${dataURL}" alt="${prod.label}"><div class="thumb-label">${prod.label} <span class="thumb-ok">✓</span></div>`;
    grid.appendChild(div);

    document.getElementById('status').textContent = `Rendered ${prod.label}…`;
    await new Promise(r => setTimeout(r, 30));
  }

  document.getElementById('status').textContent = `All ${PRODUCTS.length} thumbnails ready — click Download All below.`;
}

// ── Download all ───────────────────────────────────────────────
function downloadAll() {
  const ids = Object.keys(captured);
  if (!ids.length) { alert('Run render first'); return; }
  ids.forEach((id, i) => {
    setTimeout(() => {
      const a = document.createElement('a');
      a.href = captured[id].dataURL;
      a.download = `thumb-${id}.jpg`;
      a.click();
    }, i * 300);
  });
}

// Auto-run on load
window.addEventListener('load', () => setTimeout(renderAll, 200));
</script>
</body>
</html>
